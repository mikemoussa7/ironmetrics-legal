<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ironmetrics — Legal Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #f3f4f6;
      --card-bg: #ffffff;
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --accent: #0f172a;
      --accent-hover: #1e293b;
      --accent-blue: #0070f3;
      --border-color: #e5e7eb;
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #0b0f19;
        --card-bg: #111827;
        --text-primary: #f3f4f6;
        --text-secondary: #9ca3af;
        --accent: #ffffff;
        --accent-hover: #e5e7eb;
        --accent-blue: #3b82f6;
        --border-color: #1f2937;
        --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem 1rem;
    }

    .container {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      box-shadow: var(--shadow);
      max-width: 600px;
      width: 100%;
      padding: 3rem 2rem;
      text-align: center;
      transition: transform 0.3s ease;
    }

    .container:hover {
      transform: translateY(-4px);
    }

    .logo-container {
      margin-bottom: 2rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
    }

    .logo-icon {
      font-family: 'Outfit', sans-serif;
      color: #ffffff;
      font-size: 2rem;
      font-weight: 700;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.25rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      letter-spacing: -0.025em;
    }

    p.tagline {
      color: var(--text-secondary);
      font-size: 1rem;
      margin-bottom: 2.5rem;
    }

    .links-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .legal-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.5rem;
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      color: var(--text-primary);
      text-decoration: none;
      font-weight: 600;
      font-size: 1.05rem;
      transition: all 0.2s ease;
    }

    .legal-link:hover {
      border-color: var(--accent-blue);
      background-color: rgba(59, 130, 246, 0.05);
      transform: translateX(4px);
    }

    .link-arrow {
      color: var(--accent-blue);
      font-size: 1.25rem;
      transition: transform 0.2s ease;
    }

    .legal-link:hover .link-arrow {
      transform: translateX(4px);
    }

    footer {
      font-size: 0.85rem;
      color: var(--text-secondary);
      border-top: 1px solid var(--border-color);
      padding-top: 1.5rem;
    }

    footer a {
      color: var(--accent-blue);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo-container">
      <span class="logo-icon">I</span>
    </div>
    <h1>Ironmetrics</h1>
    <p class="tagline">Legal Agreement & Policy Center</p>

    <div class="links-list">
      <a href="privacy.html" class="legal-link">
        <span>Privacy Policy</span>
        <span class="link-arrow">&rarr;</span>
      </a>
      <a href="terms.html" class="legal-link">
        <span>Terms of Service</span>
        <span class="link-arrow">&rarr;</span>
      </a>
      <a href="data-deletion.html" class="legal-link">
        <span>Data Deletion Request</span>
        <span class="link-arrow">&rarr;</span>
      </a>
    </div>

    <footer>
      &copy; 2026 The Big M. All rights reserved.<br>
      Need support? Contact us at <a href="mailto:thebigm1019@gmail.com">thebigm1019@gmail.com</a>
    </footer>
  </div>

</body>
</html>
